pauline-epistle:
  - title:
      arabic: 'الْبُولُس: فَصْلٌ مِنْ رِسَالَةِ مُعَلِّمِنَا بُولُسَ الرَّسُولِ إِلَى أهْلِ كُولُوسِّي بَرَكَتُهُ عَلَيْنَا. آمِينْ. (٤ : ٢ - ١٨)'
    text: []
catholic-epistle:
  - title:
      arabic: 'الْكَاثُولِيكُون: فَصْلٌ مِنْ رِسَالَةِ مُعَلِّمِنَا يَعْقُوبَ الرَّسُولِ بَرَكَتُهُ عَلَيْنَا. آمِينْ.'
    text: []
acts-of-the-apostles:
  - title:
      arabic: 'الإِبْرَكْسِيسِ: فَصْلٌ مِنْ أَعْمَالِ آبَائِنَا الرُّسُلِ الْأَطْهَارِ الْمَشْمُولِينَ بِنِعْمَةِ الرُّوحِ الْقُدُسِ. بَرَكَتْهُمُ الْمُقَدَّسَةُ فَلْتَكُنْ مَعَنَا. آمِينْ. (١٨ : ١ - ١١)'
    text: []
