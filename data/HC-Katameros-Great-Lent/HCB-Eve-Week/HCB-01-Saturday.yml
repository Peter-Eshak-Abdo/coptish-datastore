pauline-epistle:
  - title:
      arabic: 'البولس : فَصْلٌ مِنْ رِسَالَةِ مُعَلِّمِنَا بُولُسَ الرَّسُولِ الثَّانِيَةِ إِلَى أَهْلِ كُورِنُتُوسَ'
    text: []
catholic-epistle:
  - title:
      arabic: 'الْكَاثُولِيكُونَ: فَصْلٌ مِنْ رِسَالَةِ مُعَلِّمِنَا بُطْرُسِ الرَّسُولِ الأُولَى بَرَكَتُهُ عَلَيْنَا . آمين. ( ۱: ۱ - ۱۲ )'
    text: []
acts-of-the-apostles:
  - title:
      arabic: 'الإبركسيس : فَصْلٌ مِنْ أَعْمَالِ آبَائِنَا الرُّسُلِ الْأَطْهَارِ الْمَسْمُولِينَ بِنِعْمَةِ الرُّوحِ الْقُدُسِ . بَرَكَتُهُمُ الْمُقَدَّسَةُ فَلْتَكُنْ مَعَنَا آمِينَ . ( ٢١ : ١ - ١٤ )'
    text: []
