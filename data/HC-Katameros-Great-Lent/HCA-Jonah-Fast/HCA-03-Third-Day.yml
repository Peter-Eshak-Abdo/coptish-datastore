matins-prophecies:
  - title:
      arabic: مِنْ سِفْرِ يُونَانَ النَّبِيِّ بَرَكَتُهُ الْمُقَدَّسَة فَلْتَكُنْ مَعَنَا آمِينَ ( ١:٣ - ١:٤ - ١١ )
    text: []
matins-psalm:
  - title:
      arabic: 'مِنْ مَزَامِيرِ أَبِينَا دَاوُدَ النَّبِيِّ ( ۱۰۲ : ۱۲ ، ۱۱ )'
    text: []
matins-gospel:
  - title:
      arabic: 'مِنْ إِنْجِيلِ مُعَلِّمِنَا مَتَّى الْبَشِير ( ١١ : ٢٥ - ٣٠ )'
    text: []
pauline-epistle:
  - title:
      arabic: 'فَصْلٌ مِنْ رِسَالَةِ مُعَلِّمِنَا بُولُسَ الرَّسُولِ إِلَى أَهْلِ أَفَسُسَ بَرَكَتُهُ عَلَيْنَا . آمین. ( ۲ : ١ - ٢٢ )'
    text: []
catholic-epistle:
  - title:
      arabic: 'فَصْلٌ مِنْ رِسَالَةِ مُعَلِّمِنَا يُوحَنَّا الرَّسُولِ الأُولَى بَرَكَتُهُ عَلَيْنَا . آمین. ( ۲ : ١٢ - ١٧ )'
    text: []
acts-of-the-apostles:
  - title:
      arabic: 'فَصْلٌ مِنْ أَعْمَالِ آبَائِنَا الرُّسُلِ الْأَطْهَارِ الْمَشْمُولِينَ بِنِعْمَةِ الرُّوحِ الْقُدُسِ . بَرَكَتُهُمُ الْمُقَدَّسَةُ فَلْتَكُنْ مَعَنَا آمِينَ. ( ١٥ : ١٢ - ٢٠ )'
    text: []
liturgy-psalm:
  - title:
      arabic: مِنْ مَزَامِيرِ أَبِينَا دَاوُدَ النَّبِيِّ ( ١:٣١ ٦٠ )
    text: []
liturgy-gospel:
  - title:
      arabic: 'مِنْ إنْجِيلِ مُعَلِّمِنًا مَتَّى الْبَشِيرِ ( ١٥ : ٣٢ - ١٦ : ١ - ٤ )'
    text: []
