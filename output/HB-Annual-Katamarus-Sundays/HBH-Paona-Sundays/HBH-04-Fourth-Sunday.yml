vespers-psalm:
  - title:
      arabic: 'مِنْ مَزَامِيرِ أَبِينَا دَاوُدَ النَّبِيِّ (٨٣ : ٩ ، ٥)'
    text:
      - arabic: 'مِنْ مَزَامِيرِ أَبِينَا دَاوُدَ النَّبِيِّ (٨٣ : ٩ ، ٥)'
      - arabic: أَيُّهَا الرَّبُّ إِلَهُ الْقُوَّاتِ اسْتَمِعْ صَلَاتِي. أَنْصِتْ يَا إِلَهَ يَعْقُوبَ. طُوبَى لِكُلِّ السُّكَّانِ فِي بَيْتِكَ، يُبَارِكُونَكَ إِلَى أَبَدِ الْأَبَدِ. هَلِّلُويَا.
vespers-gospel:
  - title:
      arabic: 'مِنْ إِنْجِيلِ مُعَلِّمِنَا مَتَّى الْبَشِيرِ (٥ : ٣٤ - ٤٨)'
    text:
      - arabic: 'مِنْ إِنْجِيلِ مُعَلِّمِنَا مَتَّى الْبَشِيرِ (٥ : ٣٤ - ٤٨)'
      - arabic: 'أَمَّا أَنَا فَأَقُولُ لَكُمْ: لَا تَحْلِفُوا الْبَتَّةَ، لَا تَحْلِفُوا بِالسَّمَاءِ لِأَنَّهَا عَرْشُ اللَّهِ، وَلَا بِالأَرْضِ لِأَنَّهَا مَوْطِئُ قَدَمَيْهِ، وَلَا بِأُورُشَلِيمَ لِأَنَّهَا مَدِينَةُ الْمَلِكِ الْعَظِيمِ. وَلَا تَحْلِفْ بِرَأْسِكَ، لِأَنَّكَ لَا تَقْدِرُ أَنْ تَجْعَلَ شَعْرَةً وَاحِدَةً بَيْضَاءَ أَوْ سَوْدَاءَ. فَلِيَكُنْ كَلَامُكُمْ: نَعَمْ نَعَمْ، وَلَا لَا. وَمَا زَادَ عَلَى ذَلِكَ فَهُوَ مِنَ الشِّرِّيرِ.'
      - arabic: 'سَمِعْتُمْ أَنَّهُ قِيلَ: عَيْنٌ بِعَيْنٍ وَسِنٌّ بِسِنٍّ. وَأَمَّا أَنَا فَأَقُولُ لَكُمْ: لَا تُقَاوِمُوا الشَّرَّ، بَلْ مَنْ لَطَمَكَ عَلَى خَدِّكَ الْأَيْمَنِ فَحَوِّلْ لَهُ الْآخَرَ. وَمَنْ أَرَادَ أَنْ يُحَاكِمَكَ لِيَأْخُذَ ثَوْبَكَ فَاتْرُكْ لَهُ رِدَاءَكَ. وَمَنْ سَخَّرَكَ مِيلًا فَامْشِ مَعَهُ اثْنَيْنِ. وَمَنْ سَأَلَكَ فَأَعْطِهِ، وَمَنْ أَرَادَ أَنْ يَقْتَرِضَ مِنْكَ فَلَا تَرُدَّهُ.'
      - arabic: 'قَدْ سَمِعْتُمْ أَنَّهُ قِيلَ: تُحِبُّ قَرِيبَكَ وَتُبْغِضُ عَدُوَّكَ. وَأَمَّا أَنَا فَأَقُولُ لَكُمْ: أَحِبُّوا أَعْدَاءَكُمْ. بَارِكُوا لَاعِنِيكُمْ. وَصَلُّوا لِأَجْلِ الَّذِينَ يَطْرُدُونَكُمْ، لِكَيْ تَصِيرُوا أَبْنَاءَ أَبِيكُمُ الَّذِي فِي السَّمَاوَاتِ، فَإِنَّهُ يُشْرِقُ شَمْسَهُ عَلَى الْأَشْرَارِ وَالْأَخْيَارِ، وَيُمْطِرُ عَلَى الأَبْرَارِ وَالظَّالِمِينَ. لِأَنَّهُ إِنْ أَحْبَبْتُمُ الَّذِينَ يُحِبُّونَكُمْ، فَمَا هُوَ أَجْرُكُمْ؟ فَالْعَشَّارُونَ أَيْضًا يَفْعَلُونَ كَذَلِكَ. وَإِنْ سَلَّمْتُمْ عَلَى إِخْوَتِكُمْ فَقَطْ، فَأَيَّ فَضْلٍ تَفْعَلُونَ؟ فَالْوَثَنِيُّونَ أَيْضًا يَفْعَلُونَ هَكَذَا. فَكُونُوا إِذًا أَنْتُمْ كَامِلِينَ كَمَا أَنَّ أَبَاكُمُ الَّذِي فِي السَّمَاوَاتِ هُوَ كَامِلٌ.'
      - arabic: (وَالْمَجْدُ لِلَّهِ دَائِمًا)
matins-psalm:
  - title:
      arabic: 'مِنْ مَزَامِيرٍ أَبِينَا دَاوُدَ النَّبِيِّ (٦٠ : ٤ ، ٧)'
    text:
      - arabic: 'مِنْ مَزَامِيرٍ أَبِينَا دَاوُدَ النَّبِيِّ (٦٠ : ٤ ، ٧)'
      - arabic: أَنْتَ يَا اللَّهُ اسْتَمَعْتَ صَلَوَاتِي، أَعْطَيْتَ مِيرَاثًا لِخَائِفِي اسْمِكَ. هَكَذَا أُرَتِّلُ لِاسْمِكَ إِلَى دَهْرِ الدُّهُورِ. لِأَفِي نُذُورِي يَوْمًا فَيَوْمًا. هَلِّلُويَا.
matins-gospel:
  - title:
      arabic: 'مِنْ إِنْجِيلِ مُعَلِّمِنَا يُوحَنَّا الْبَشِيرِ (٢٠ : ١ - ١٨)'
    text:
      - arabic: 'مِنْ إِنْجِيلِ مُعَلِّمِنَا يُوحَنَّا الْبَشِيرِ (٢٠ : ١ - ١٨)'
      - arabic: 'وَفِي الْأَحَدِ (أَوَّلِ الأُسْبُوعِ) جَاءَتْ مَرْيَمُ الْمَجْدَليَّةُ إِلَى الْقَبْرِ بَاكِرًا، وَالظَّلامُ بَاقٍ. فَرَأَتِ الْحَجَرَ مَرْفُوعًا عَنْ بَابِ الْقَبْرِ. فَأَسْرَعَتْ وَجَاءَتْ إِلَى سِمْعَانَ بُطرُسَ وَإِلَى التِّلمِيذِ الْآخَرِ الَّذِي كَانَ يَسُوعُ يُحِبُّهُ، وَقَالَتْ لَهُمَا: «قَدْ أَخَذُوا سَيِّدِي مِنَ الْقَبْرِ، وَلَسْتُ أَعْلَمُ أَيْنَ وَضَعُوهُ!». فَخَرَجَ بُطرُسَ وَالتِّلمِيذُ الْآخَرُ وَأَتَيَا إِلَى الْقَبْرِ. وَكَانَا يُسْرِعَانِ كِلَاهُمَا مَعًا. فَرَكَضَ التِّلمِيذُ الْآخَرُ وَسَبَقَ بُطرُسَ وَتَقَدَّمَ أَوَّلًا إِلَى الْقَبْرِ، وَتَطَلَّعَ دَاخِلًا وَرَأَى الثِّيَابَ مَوْضُوعَةً، وَلَمْ يَدْخُلْ. ثُمَّ جَاءَ سِمْعَانُ بُطرُسُ يَتْبَعُهُ، وَدَخَلَ الْقَبْرَ وَنَظَرَ الثِّيَابَ مَوْضُوعَةً، وَالْمِنْدِيلُ الَّذِي كَانَ عَلَى رَأْسِهِ لَيْسَ مَوْضُوعًا مَعَ الثِّيَابِ، بَلْ مَلْفُوفًا وَمَوْضُوعًا فِي نَاحِيَةٍ وَحْدَهُ. فَحِينَئِذٍ دَخَلَ أَيْضًا التِّلْمِيذُ الْآخَرُ الَّذِي جَاءَ أَوَّلًا إِلَى الْقَبْرِ، وَرَأَى فَآمَنَ، لِأَنَّهُمْ لَمْ يَكُونُوا بَعْدُ يَعْرِفُونَ الْكِتَابَ: أنَّهُ يَنْبَغِي أَنْ يَقُومَ مِنْ بَيْنِ الْأَمْواتِ. فَمَضَى التِّلْمِيذَانِ أَيْضًا إِلَى مَوْضِعِهِمَا.'
      - arabic: 'أَمَّا مَرْيَمُ فَكَانَتْ وَاقِفَةً عِنْدَ الْقَبْرِ خَارِجًا تَبْكِي. وَفِيمَا هِيَ تَبْكِي تَطَلَّعَتْ دَاخِلَ الْقَبْرِ، فَرَأَتْ مَلَاكَيْنِ بِثِيَابٍ بِيضٍ جَالِسَيْنِ وَاحِدًا عَنْدَ رَأْسِهِ وَالْآخَرَ عِنْدَ رِجْلَيهِ، حَيْثُ كَانَ جَسَدُ يَسُوعَ مَوْضُوعًا. فَقَالَا لَهَا: «يَا امْرَأَةُ، مَا بَالُكِ تَبْكِينَ؟». فَقَالَتْ لَهُمَا: «إِنَّهُمْ أَخَذُوا سَيِّدِي، وَلَسْتُ أَعْلَمُ أَيْنَ وَضَعُوهُ». وَلَمَّا قَالَتْ هَذَا الْتَفَتَتْ إِلَى الْوَرَاءِ، فَنَظَرَتْ يَسُوعَ وَاقِفًا، وَلَمْ تَعْلَمْ أَنَّهُ يَسُوعُ. فَقَالَ لَهَا يَسُوعُ: «يَا امْرَأَةُ، لِمَاذَا تَبْكِينَ؟ مَنْ تَطْلُبِينَ؟». فَظَنَّتْ أَنَّهُ الْبُسْتَانِيُّ، فَقَالَتْ لَهُ: «يَا سَيِّدي، إِنْ كُنْتَ أَنْتَ قَدْ حَمَلْتَهُ فَأَعْلِمْنِي أَيْنَ وَضَعْتَهُ، وَأَنَا آخُذُهُ». قَالَ لَهَا يَسُوعُ: «يَا مَرْيَمُ» فَالْتَفَتَتْ هِيَ وَقَالَتْ لَهُ بِالْعِبْرَانِيةِ: «رَبُّونِي!» الَّذِي تَفْسِيرُهُ: يَا مُعَلِّمُ. قَالَ لَهَا يَسُوعُ: «لَا تَلْمِسِينِي لِأَنِّي لَمْ أَصْعَدْ بَعْدُ إِلَى أَبِي. فَامْضِي إِلَى إِخْوَتِي وَقُولِي لَهُمْ: إنِّي صَاعِدٌ إِلَى أَبِي الَّذِي هُوَ أَبُوكُمْ، وَإِلَهِي الَّذِي هُوَ إِلَهُكُمْ». فَجَاءَتْ مَرْيَمُ الْمَجْدَلِيَّةُ وَأَخْبَرَتِ التَّلَامِيذَ: «إنِّي رَأَيْتُ الرَّبَّ، وَأَنَّهُ قَالَ لِي هَذَا».'
      - arabic: (وَالْمَجْدُ لِلَّهِ دَائِمًا)
pauline-epistle:
  - title:
      arabic: 'الْبُولُس: فَصْلٌ مِنْ رِسَالَةِ مُعَلِّمِنَا بُولُسَ الرَّسُولِ إِلَى أهْلِ كُولُوسِّي بَرَكَتُهُ عَلَيْنَا. آمِينْ. (٤ : ٢ - ١٨)'
    text:
      - arabic: 'الْبُولُس: فَصْلٌ مِنْ رِسَالَةِ مُعَلِّمِنَا بُولُسَ الرَّسُولِ إِلَى أهْلِ كُولُوسِّي بَرَكَتُهُ عَلَيْنَا. آمِينْ. (٤ : ٢ - ١٨)'
      - arabic: 'كُونُوا مُوَاظِبِينَ عَلَى الصَّلَاةِ سَاهِرِينَ فِيهَا بِالشُّكْرِ، مُصَلِّينَ فِي ذَلِكَ لِأَجْلِنَا نَحْنُ أَيْضًا، لِكَيْ يَفْتَحَ اللَّهُ لَنَا بَابًا لِلْكَلَامِ، لِنَتَكَلَّمَ بِسِرِّ الْمَسِيحِ، هَذَا الَّذِي أَنَا مِنْ أَجْلِهِ مُوثَقٌ، كَيْ أُظْهِرَهُ كَمَا يَجِبُ أَنْ أَتَكَلَّمَ. اُسْلُكُوا بِحِكْمَةٍ مِنْ جِهَةِ الَّذِينَ هُمْ مِنْ خَارِجٍ، مُفْتَدِينَ الْوَقْتَ. لِيَكُنْ كَلَامُكُمْ كُلَّ حِينٍ بِنِعْمَةٍ، مُصْلَحًا بِمِلْحٍ، لِتَعْلَمُوا كَيْفَ يَجِبُ أَنْ تُجَاوِبُوا كُلَّ وَاحِدٍ. جَمِيعُ أَحْوَالِي: سَيُعَرِّفُكُمْ بِهَا تِيخِيكُسُ الْأَخُ الْحَبِيبُ، وَالْخَادِمُ الْأَمِينُ، وَالْعَبْدُ الشَّرِيكُ فِي الرَّبِّ، هَذَا الَّذِي أَرْسَلْتُهُ إِلَيْكُمْ لِهَذَا الْأَمْرِ، لِيَعْلَمَ أَخْبَارَكُمْ وَيُعَزِّيَ قُلُوبَكُمْ، مَعَ أُنِسِيمُوسَ الْأَخِ الْأَمِينِ الْحَبِيبِ الَّذِي هُوَ مِنْكُمْ. هُمَا سَيُخْبِرَانِكُمْ بِكُلِّ مَا هَهُنَا. يُسَلِّمُ عَلَيْكُمْ أَرِسْتَرْخُسُ الْمَأْسُورُ مَعِي، وَمَرْقُسُ ابْنُ عَمِّ بَرْنَابَا، الَّذِي أَخَذْتُمْ مِنْ أَجْلِهِ وَصَايَا. إِنْ أَتَى إِلَيْكُمْ فَاقْبَلُوهُ. وَيَسُوعُ الَّذِي يُدْعَى يُسْطُسَ، الَّذِينَ هُمْ مِنَ الْخِتَانِ. هَؤُلَاءِ هُمْ وَحْدَهُمُ الْعَامِلُونَ مَعِي لِمَلَكُوتِ اللَّهِ، الَّذِينَ صَارُوا لِي عَزَاءً. يُسَلِّمُ عَلَيْكُمْ أَبَفْرَاسُ، الَّذِي هُوَ مِنْكُمْ، عَبْدٌ لِلْمَسِيحِ يَسُوعَ، هَذَا الَّذى يُجَاهِدُ كُلَّ حِينٍ لِأَجْلِكُمْ بِصَلَوَاتِهِ، لِكَيْ تَثْبُتُوا كَامِلِينَ وَمُمْتَلِئِينَ مِنْ مَشِيئَةِ اللَّهِ. فَإِنِّي أَشْهَدُ فِيهِ أَنَّ لَهُ غَيْرَةً كَثِيرَةً لِأَجْلِكُمْ، وَلِأَجْلِ الَّذِينَ فِي لَاوُدِكِيَّةَ، وَالَّذِينَ فِي هِيَرَابُولِيسَ. يُسَلِّمُ عَلَيْكُمْ لُوقَا الطَّبِيبُ الْحَبِيبُ، وَدِيمَاسُ. سَلِّمُوا عَلَى الْإِخْوَةِ الَّذِينَ فِي لَاوُدِكِيَّةَ، وَعَلَى نِمْفَاسَ، وَعَلَى الْكَنِيسَةِ الَّتِي فِي بَيْتِهِمْ. وَمَتَى قُرِئَتْ عِنْدَكُمْ هَذِهِ الرِّسَالَةُ، فَلْتُقْرَأُ فِي كَنِيسَةِ اللَّاوُدِكِيِّينَ، وَالَّتِي مِنْ لَاوُدِكِيَّةَ تَقْرَأُونَهَا أَنْتُمْ أَيْضًا. وَقُولُوا لِأَرْخِبُّسَ: «انْظُرْ إِلَى الْخِدْمَةِ الَّتِي قَبِلْتَهَا فِي الرَّبِّ، لِكَيْ تُتَمِّمَهَا». سَلَامِي بِيَدِي أَنَا بُولُسَ. أُذْكُرُوا وُثُقِي. النِّعْمَةُ مَعَكُمْ. آمِينَ.'
      - arabic: (نِعْمَةُ اللَّهِ الْآبِ فَلْتَحُلَّ عَلَى أَرْوَاحِنَا يَا آبَائِي وَإِخْوَتِي. آمِينْ.)
catholic-epistle:
  - title:
      arabic: 'الْكَاثُولِيكُون: فَصْلٌ مِنْ رِسَالَةِ مُعَلِّمِنَا يَعْقُوبَ الرَّسُولِ بَرَكَتُهُ عَلَيْنَا. آمِينْ.'
    text:
      - arabic: 'الْكَاثُولِيكُون: فَصْلٌ مِنْ رِسَالَةِ مُعَلِّمِنَا يَعْقُوبَ الرَّسُولِ بَرَكَتُهُ عَلَيْنَا. آمِينْ.'
      - arabic: '(٥ : ٩ - ٢٠)'
      - arabic: 'لَا يَئِنَّ بَعْضُكُمْ عَلَى بَعْضٍ يَا إِخْوَتِي لِئَلَّا تُدَانُوا. هُوَذَا الدَّيَّانُ وَاقِفٌ عَلَى الْأَبْوَابِ. خُذُوا لَكُمْ يَا إِخْوَتِي مِثَالًا: احْتِمَالَ الْمَشَقَّاتِ وَطُولَ أَنَاةِ الْأَنْبِيَاءِ الَّذِينَ تَكَلَّمُوا بِاسْمِ الرَّبِّ. هَا نَحْنُ نُطَوِّبُ الصَّابِرِينَ. قَدْ سَمِعْتُمْ بِصَبْرِ أَيُّوبَ وَرَأَيْتُمْ عَاقِبَةَ الرَّبِّ. لِأَنَّ الرَّبَّ هُوَ عَظِيمُ الرَّأْفَةِ جِدًّا وَهُوَ طَويلُ الْأَنَاةِ.'
      - arabic: 'وَقَبْلَ كُلِّ شَيْءٍ يَا إِخْوَتِي، لَا تَحْلِفُوا لَا بِالسَّمَاءِ وَلَا بِالأَرْضِ وَلَا بِقَسَمٍ آخَرَ. وَلِيَكُنْ كَلَامُكُمْ: نَعَمْ نَعَمْ، وَلَا لَا، لِئَلَّا تَكُونُوا تَحْتَ الْحُكْمِ.'
      - arabic: وَإِنْ كَانَ وَاحِدٌ مِنْكُمْ قَدْ نَالَهُ تَعَبٌ فَلْيُصَلِّ. وَالفَرِحُ القَلْبِ فَلْيُرَتِّلْ. وَإِنْ كَانَ وَاحِدٌ مِنْكُمْ مَرِيضًا فَلْيَدْعُ قُسُوسَ الْكَنِيسَةِ وَلْيُصَلُّوا عَلَيْهِ وَيَدْهَنُوهُ بِزَيْتٍ بِاسْمِ الرَّبِّ، وَصَلَاةُ الإِيمَانِ تُخَلِّصُ الْمَرِيضَ، وَالرَّبُّ يُقِيمُهُ، وَإِنْ كَانَ قَدْ عَمِلَ خَطَايَا تُغْفَرُ لَهْ. فَاِعْتَرِفُوا بِخَطَايَاكُمْ بَعْضُكُمْ لِبَعْضٍ، وَصَلُّوا بَعْضُكُمْ لأَجْلِ بَعْضٍ، لِكَيْ تُشْفَوْا. وَصَلَاةُ البَارِّ فِيهَا قُوَّةٌ عَظِيمَةٌ فَعَّالَةٌ. كَانَ إِيلِيَّا إِنْسَانًا تَحْتَ الْآلَامِ مِثْلَنَا، وَصَلَّى صَلَاةً كَيْ لَا تُمْطِرَ السَّمَاءُ، فَلَمْ تُمْطِرْ عَلَى الأَرْضِ ثَلَاثَ سِنِينَ وَسِتَّةَ أَشْهُرٍ. وَصَلَّى أَيْضًا، فَأَعْطَتِ السَّمَاءُ الْمَطَرَ، وَالْأَرْضُ أَخْرَجَتِ ثَمَرَهَا.
      - arabic: يَا إِخْوَتِي، إِذَا ضَلَّ وَاحِدٌ مِنْكُمْ عَنِ سَبيلِ الْحَقِّ وَرَدَّهُ وَاحِدٌ، فَلْيَعْلَمْ أَنَّ مَنْ يَرُدَّ الْخَاطِئَ عَنْ طَرِيقِ ضَلَالَتِهِ، فَإِنَّهُ يُخَلِّصُ نَفْسَهُ مِنَ الْمَوْتِ، وَيَسْتُرُ خَطَايَا كَثِيرَةً.
      - arabic: (لَا تُحِبُّوا الْعَالَمَ وَلَا الأَشْيَاءَ الَّتِي فِي الْعَالَمِ، لِأَنَّ الْعَالَمَ يَمْضِي وَشَهْوَتُهُ مَعَهُ، وَأَمَّا مَنْ يَعْمَلُ مَشِيئَةَ اللَّهِ فَإِنَّهُ يَثْبُتُ إِلَى الْأَبَدِ. آمِينْ.)
acts-of-the-apostles:
  - title:
      arabic: 'الإِبْرَكْسِيسِ: فَصْلٌ مِنْ أَعْمَالِ آبَائِنَا الرُّسُلِ الْأَطْهَارِ الْمَشْمُولِينَ بِنِعْمَةِ الرُّوحِ الْقُدُسِ. بَرَكَتْهُمُ الْمُقَدَّسَةُ فَلْتَكُنْ مَعَنَا. آمِينْ. (١٨ : ١ - ١١)'
    text:
      - arabic: 'الإِبْرَكْسِيسِ: فَصْلٌ مِنْ أَعْمَالِ آبَائِنَا الرُّسُلِ الْأَطْهَارِ الْمَشْمُولِينَ بِنِعْمَةِ الرُّوحِ الْقُدُسِ. بَرَكَتْهُمُ الْمُقَدَّسَةُ فَلْتَكُنْ مَعَنَا. آمِينْ. (١٨ : ١ - ١١)'
      - arabic: 'وَبَعْدَ هَذَا مَضَى بُولُسُ مِنْ أَثِينَا وَجَاءَ إِلَى كُورِنْثُوسَ، فَوَجَدَ يَهُودِيًّا اسْمُهُ أَكِيلَا، بُنْطِيَّ الْجِنْسِ، كَانَ قَدْ جَاءَ حَدِيثًا مِنْ إِيطَالِيَا مَعَ بِرِيسْكِلَّا امْرَأَتِهِ، لِأَنَّ كلُودِيُوسَ كَانَ قَدْ أَمَرَ بِأَنْ يُنْفَى جَمِيعُ الْيَهُودِ مِنْ رُومِيَةَ، فَجَاءَ إِلَيْهِمَا. وَأَقَامَ عِنْدَهُمَا لِكَوْنِهِ مِنْ أَهْلِ صِنَاعَتِهِمَا وَكَانَا يَشْتَغِلَانِ مَعًا، لِأَنَّ صِنَاعَتَهِمَا كَانَتْ عَمَلَ الْخِيَامِ. وَكَانَ يَتَكَلَّمُ فِي الْمَجْمَعِ كُلَّ سَبْتٍ، وَيُقْنِعُ الْيَهُودَ وَالْيُونَانِيِّينَ. وَلَمَّا قَدِمَ سِيلَا وَتِيمُوثَاوُسُ مِنْ مَكِدُونِيَّةَ، كَانَ بُولُسُ يُدَاوِمُ عَلَى الْكَلَامِ وَهُوَ يَشْهَدُ لِلْيَهُودِ أَنَّ الْمَسِيحَ هُوَ يَسُوعُ. وَإِذْ كَانُوا يُقَاوِمُونَهُ وَيُجَدِّفُونَ نَفَضَ ثِيَابَهُ وَقَالَ لَهُمْ: «دَمُكُمْ عَلَى رَأْسِكُمْ! أَنَا بَرِيءٌ. مِنَ الْآنَ أَنْطَلِقُ إِلَى الْأُمَمِ». فَانْتَقَلَ مِنْ هُنَاكَ وَجَاءَ إِلَى بَيْتِ وَاحِدٍ يُدْعى يُسْطُسِ، كَانَ مُتَعَبِّدًا لِلَّهِ، وَكَانَ بَيْتُهُ مُلَاصِقًا لِلْمَجْمَعِ. أَمَّا كِرِيسْبُسُ رَئِيسُ الْمَجْمَعِ فَآمَنَ بِالرَّبِّ مَعَ جَمِيعِ بَيْتِهِ، وَكَثِيرُونَ مِنَ الْكُورِنْثِيِّينَ إِذْ سَمِعُوا آمَنُوا وَاعْتَمَدُوا.'
      - arabic: 'فَقَالَ الرَّبُّ لِبُولُسَ فِي رُؤْيَا لَيْلًا: «لَا تَخَفْ، بَلْ تَكَلَّمْ وَلَا تَسْكُتْ، لِأَنِّي أَنَا مَعَكَ، وَلَنْ يَقُومَ أَحَدٌ عَلَيْكَ لِيُؤْذِيَكَ، لِأَنَّ لِي شَعْبًا كَثِيرًا فِي هَذِهِ الْمَدِينَةِ». فَأَقَامَ سَنَةً وَسِتَّةَ أَشْهُرٍ، يُعَلِّمُ بَيْنَهُمْ بِكَلِمَةِ اللَّهِ.'
      - arabic: (لَمْ تَزَلْ كَلِمَةُ الرَّبِّ تَنْمُو وتَكْثُرُ وتَعْتَزُّ وتَثبتُ، فِي بِيعَةِ اللَّهِ الْمُقَدَّسَةِ. آمِينْ.)
liturgy-psalm:
  - title:
      arabic: 'مِنْ مَزَامِيرِ أَبِينَا دَاوُدَ النَّبِيِّ (٦٨ : ٢٦ ، ٢٧ ، ٢٥)'
    text:
      - arabic: 'مِنْ مَزَامِيرِ أَبِينَا دَاوُدَ النَّبِيِّ (٦٨ : ٢٦ ، ٢٧ ، ٢٥)'
      - arabic: اُطْلُبُوا اللَّهَ فَتَحْيَا نَفْسُكُمْ. لِأَنَّ الرَّبَّ قَدِ اسْتَجَابَ لِلْبَائِسِينَ. أُسَبِّحُ اسْمَ اللَّهِ بِنَشِيدٍ، وَأُرَفِّعُهُ بِتَسْبِيحٍ. هَلِّلُويَا.
liturgy-gospel:
  - title:
      arabic: 'مِنْ إِنْجِيلِ مُعَلِّمِنَا لُوقَا الْبَشِيرِ (٦ : ٢٧- ٣٨)'
    text:
      - arabic: 'مِنْ إِنْجِيلِ مُعَلِّمِنَا لُوقَا الْبَشِيرِ (٦ : ٢٧- ٣٨)'
      - arabic: 'لَكِنِّي أَقُولُ لَكُمْ أَيُّهَا السَّامِعُونَ: أَحِبُّوا أَعْدَاءَكُمْ، أَحْسِنُوا إِلَى مُبْغِضِيكُمْ، بَارِكُوا لَاعِنِيكُمْ، صَلُّوا لِأَجْلِ الَّذِينَ يَضْطَهِدُونَكُمْ. مَنْ لَطَمَكَ عَلَى خَدِّكَ فَحَوِّلْ لَهُ الْآخَرَ، وَمَنْ أَخَذَ رِدَاءَكَ فَلَا تَمْنَعْهُ مِنْ أَنْ يَأْخُذَ ثَوْبَكَ أَيْضًا. وَكُلُّ مَنْ سَأَلَكَ فَأَعْطِهِ، وَمَنْ أَخَذَ الَّذِي لَكَ فَلَا تُطَالِبْهُ. وَكَمَا تُرِيدُونَ أَنْ يَفْعَلَ النَّاسُ بِكُمُ، افْعَلُوا أَنْتُمْ أَيْضًا بِهِمْ هَكَذَا. وَإِنْ أَحْبَبْتُمُ الَّذِينَ يُحِبُّونَكُمْ، فَمَا هُوَ أَجْرُكُمْ؟ فَإِنَّ الْخُطَاةَ أَيْضًا يُحِبُّونَ مَنْ يُحِبُّهُمْ. وَإِذَا صَنَعْتُم الْخَيْرَ مَعَ الَّذِينَ يُحْسِنُونَ إِلَيْكُمْ، فَمَا هُوَ فَضْلُكُمْ؟ فَإِنَّ الْخُطَاةَ يَفْعَلُونَ هَكَذَا. وَإِنْ أَقْرَضْتُمُ الَّذِينَ تَرْجُونَ أَنْ تَسْتَرِدُّوا مِنْهُمْ، فَمَا هُوَ فَضْلُكُمْ؟ فَإِنَّ الْخُطَاةَ أَيْضًا يُقْرِضُونَ الْخُطَاةَ لِكَيْ يَأْخُذُوا مِنْهُمُ الْعِوَضَ. بَلْ أَحِبُّوا أَعْدَاءَكُمْ، وَأَحْسِنُوا إِلَيْهِمْ، وَأَعْطُوا وَأَنْتُمْ لَا تَرْجُونَ شَيْئًا، فَيَكُونَ أَجْرُكُمْ عَظِيمًا وَتَكُونُوا بَنِي الْعَلِيِّ، فَإِنَّهُ صَالِحٌ عَلَى غَيْرِ الشَّاكِرِينَ وَالأَشْرَارِ. فَكُونُوا رُحَمَاءَ كَمَا أَنَّ أَبَاكُمْ رَحِيمٌ.'
      - arabic: وَلَا تَدِينُوا فَلَا تُدَانُوا. لَا تَقْضُوا عَلَى أَحَدٍ فَلَا يُحْكَمَ عَلَيْكُمْ. اِغْفِرُوا يُغْفَرْ لَكُمْ. أَعْطُوا تُعْطَوْا، كَيْلًا جَيِّدًا مُلَبَّدًا مَهْزُوزًا فَائِضًا يُعْطُونَ فِي أَحْضَانِكُمْ. لِأَنَّهُ بِالْكَيْلِ الَّذِي بِهِ تَكِيلُونَ يُكَالُ لَكُمْ.
      - arabic: (وَالْمَجْدُ لِلَّهِ دَائِمًا)
